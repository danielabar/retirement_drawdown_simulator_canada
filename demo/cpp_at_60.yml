# CPP timing comparison — taking CPP at the earliest possible age (60).
# $1,500,000 portfolio ($900K RRSP / $300K Taxable / $300K TFSA) plus a $60,000 cash cushion,
# retiring at 60 with $60,000/year spending (single, modest Vancouver/Toronto),
# running to 95 (35-year horizon), Ontario.
# Portfolio sized at 4% rule: $60,000 / 0.04 = $1,500,000 (cash cushion excluded from calculation).
# CPP at 60 pays $896/month — lower monthly income, but it starts immediately.
# Compare to demo/cpp_at_65.yml and demo/cpp_at_70.yml.
# mode: success_rate
total_runs: 1000
retirement_age: 60
max_age: 95
desired_spending: 60000
annual_tfsa_contribution: 0
province_code: ONT
success_factor: 1

return_sequence_type: geometric_brownian_motion
annual_growth_rate:
  average: 0.05
  min: -0.25
  max: 0.35
  downturn_threshold: -0.1
  savings: 0.005

accounts:
  rrsp: 900000
  taxable: 300000
  tfsa: 300000
  cash_cushion: 60000

cpp:
  start_age: 60
  monthly_amount: 896

oas:
  start_age: 65
  years_in_canada_after_18: 40

taxes:
  rrsp_withholding_rate: 0.3
