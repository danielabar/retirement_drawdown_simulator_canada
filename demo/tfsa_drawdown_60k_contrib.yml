# Same as demo/tfsa_drawdown_60k.yml but with a $7,000/year TFSA contribution
# during the RRSP drawdown phase. The contribution is on top of the $60,000
# spending, so the portfolio must fund $67,000/year equivalent — meaning a larger
# gross RRSP withdrawal each year (since RRSP withdrawals are taxable income).
# Compare success rate and percentiles to demo/tfsa_drawdown_60k.yml.
# mode: success_rate
total_runs: 1000
retirement_age: 65
max_age: 95
desired_spending: 60000
annual_tfsa_contribution: 7000
province_code: ONT
success_factor: 1

return_sequence_type: geometric_brownian_motion
annual_growth_rate:
  average: 0.04
  min: -0.25
  max: 0.35
  downturn_threshold: -0.1
  savings: 0.005

accounts:
  rrsp: 1028400
  taxable: 342800
  tfsa: 342800
  cash_cushion: 60000

cpp:
  start_age: 65
  monthly_amount: 800

oas:
  start_age: 65
  years_in_canada_after_18: 40

taxes:
  rrsp_withholding_rate: 0.3
